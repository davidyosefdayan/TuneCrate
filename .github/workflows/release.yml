name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: macos-arm64
          - os: macos-13
            platform: macos-x64
          - os: windows-latest
            platform: windows-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --omit=dev

      - name: Build release
        run: node scripts/build-release.js --platform ${{ matrix.platform }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TuneCrate-${{ matrix.platform }}
          path: dist/TuneCrate-${{ matrix.platform }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/TuneCrate-*/TuneCrate-*.zip
          body: |
            ## Installation

            1. Download the ZIP for your platform below
            2. Extract it
            3. **macOS:** Run `install.sh` from the extracted folder (or manually copy the `TuneCrate` folder to `/Library/Application Support/Blackmagic Design/DaVinci Resolve/Workflow Integration Plugins/`)
            4. **Windows:** Run `install.bat` (or manually copy the `TuneCrate` folder to `%PROGRAMDATA%\Blackmagic Design\DaVinci Resolve\Support\Workflow Integration Plugins\`)
            5. Restart DaVinci Resolve
            6. Open: **Workspace > Workflow Integrations > TuneCrate**

            > **Note:** Requires DaVinci Resolve Studio. Workflow Integrations are not available in the free version.

            ## Assets
            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `TuneCrate-macos-arm64.zip` |
            | macOS (Intel) | `TuneCrate-macos-x64.zip` |
            | Windows | `TuneCrate-windows-x64.zip` |
