name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: macos-arm64
          - os: macos-13
            platform: macos-x64
          - os: windows-latest
            platform: windows-x64

    runs-on: ${{ matrix.os }}
    env:
      APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --omit=dev

      - name: Install Windows installer tools
        if: runner.os == 'Windows'
        shell: powershell
        run: choco install innosetup --yes --no-progress

      - name: Import Apple signing certificate
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE_BASE64 != ''
        run: |
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security create-keychain -p actions "$RUNNER_TEMP/tunecrate.keychain-db"
          security set-keychain-settings -lut 21600 "$RUNNER_TEMP/tunecrate.keychain-db"
          security unlock-keychain -p actions "$RUNNER_TEMP/tunecrate.keychain-db"
          security import "$RUNNER_TEMP/certificate.p12" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$RUNNER_TEMP/tunecrate.keychain-db"
          security list-keychain -d user -s "$RUNNER_TEMP/tunecrate.keychain-db"
          security set-key-partition-list -S apple-tool:,apple: -s -k actions "$RUNNER_TEMP/tunecrate.keychain-db"

      - name: Configure Apple notarization
        if: runner.os == 'macOS' && env.APPLE_ID != ''
        run: xcrun notarytool store-credentials TuneCrateNotary --apple-id "$APPLE_ID" --password "$APPLE_APP_PASSWORD" --team-id "$APPLE_TEAM_ID"

      - name: Build release
        env:
          INSTALLER_SIGNING_IDENTITY: ${{ secrets.INSTALLER_SIGNING_IDENTITY }}
          APPLE_NOTARY_PROFILE: ${{ secrets.APPLE_NOTARY_PROFILE }}
        run: node scripts/build-release.js --platform ${{ matrix.platform }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TuneCrate-${{ matrix.platform }}
          path: |
            dist/TuneCrate-${{ matrix.platform }}.pkg
            dist/TuneCrate-${{ matrix.platform }}.exe

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/TuneCrate-*/*.pkg
            artifacts/TuneCrate-*/*.exe
          body: |
            ## Installation

            1. Download the installer for your computer
            2. Double-click it and follow the prompts
            3. Restart DaVinci Resolve
            4. Open **Workspace > Workflow Integrations > TuneCrate**

            > **Note:** Requires DaVinci Resolve Studio. Workflow Integrations are not available in the free version.

            ## Assets
            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `TuneCrate-macos-arm64.pkg` |
            | macOS (Intel) | `TuneCrate-macos-x64.pkg` |
            | Windows | `TuneCrate-windows-x64.exe` |
