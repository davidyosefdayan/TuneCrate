<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' https://*.ytimg.com https://*.ggpht.com https://*.googleusercontent.com data:; media-src 'self' https://*.googlevideo.com local-audio: preview-audio:; connect-src 'self' https://*.googlevideo.com; style-src 'self' 'unsafe-inline'; script-src 'self'">
    <title>YouTube Music</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Titlebar drag region -->
    <div class="titlebar">
        <span class="titlebar-title">YouTube Music</span>
    </div>

    <!-- Tab navigation -->
    <nav class="tabs">
        <button class="tab active" data-tab="search">Home</button>
        <button class="tab" data-tab="library">Library</button>
        <button class="tab" data-tab="settings">Settings</button>
    </nav>

    <!-- Search / Home tab -->
    <div class="tab-content active" id="tab-search">
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="Search YouTube Music..." autocomplete="off">
            <button id="search-clear-btn" class="btn-icon search-clear-btn hidden" title="Clear search">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
            <button id="search-btn" class="btn-icon" title="Search">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
                </svg>
            </button>
        </div>

        <!-- Filter bar (visible only during search) -->
        <div id="search-filters" class="search-filters hidden">
            <div class="sort-select">
                <select id="search-sort">
                    <option value="relevance">Relevance</option>
                    <option value="duration-asc">Shortest first</option>
                    <option value="duration-desc">Longest first</option>
                </select>
            </div>
        </div>

        <!-- Home view (default) -->
        <div id="home-view" class="home-view">
            <div class="loading-state" id="home-loading">
                <div class="spinner"></div>
                <span>Loading...</span>
            </div>
            <div id="home-sections"></div>
        </div>

        <!-- Search results -->
        <div id="search-results" class="results-list hidden"></div>

        <!-- Playlist detail view -->
        <div id="playlist-detail" class="playlist-detail hidden">
            <div class="playlist-detail-header">
                <button id="playlist-detail-back" class="btn-icon playlist-back-btn" title="Back">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="15 18 9 12 15 6"/>
                    </svg>
                </button>
                <img id="playlist-detail-thumb" class="playlist-detail-thumb" src="" alt="">
                <div class="playlist-detail-info">
                    <div id="playlist-detail-title" class="playlist-detail-title"></div>
                    <div id="playlist-detail-artist" class="playlist-detail-artist"></div>
                    <div id="playlist-detail-count" class="playlist-detail-count"></div>
                </div>
            </div>
            <div id="playlist-detail-tracks" class="results-list"></div>
        </div>

        <!-- Artist detail view -->
        <div id="artist-detail" class="detail-view hidden">
            <div class="detail-view-header">
                <button id="artist-detail-back" class="btn-icon detail-back-btn" title="Back">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="15 18 9 12 15 6"/>
                    </svg>
                </button>
                <img id="artist-detail-thumb" class="detail-view-thumb artist-thumb" src="" alt="">
                <div class="detail-view-info">
                    <div class="detail-view-label">Artist</div>
                    <div id="artist-detail-name" class="detail-view-title"></div>
                </div>
            </div>
            <div id="artist-detail-content" class="detail-view-content"></div>
        </div>

        <!-- Album detail view -->
        <div id="album-detail" class="detail-view hidden">
            <div class="detail-view-header">
                <button id="album-detail-back" class="btn-icon detail-back-btn" title="Back">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="15 18 9 12 15 6"/>
                    </svg>
                </button>
                <img id="album-detail-thumb" class="detail-view-thumb" src="" alt="">
                <div class="detail-view-info">
                    <div class="detail-view-label">Album</div>
                    <div id="album-detail-name" class="detail-view-title"></div>
                    <div id="album-detail-artist" class="detail-view-subtitle clickable-artist"></div>
                    <div id="album-detail-year" class="detail-view-meta"></div>
                </div>
            </div>
            <div id="album-detail-tracks" class="results-list"></div>
        </div>
    </div>

    <!-- Library tab -->
    <div class="tab-content" id="tab-library">
        <!-- Library list view -->
        <div id="library-list-view" class="library-list-view">
            <div class="library-list-header">
                <h3>Library</h3>
                <button id="create-playlist-btn" class="btn-small">+ New</button>
            </div>
            <div id="library-list" class="library-list"></div>
        </div>

        <!-- Library detail view (opens when clicking a playlist/downloads) -->
        <div id="library-detail" class="library-detail hidden">
            <div class="library-detail-header">
                <button id="library-detail-back" class="btn-icon detail-back-btn" title="Back">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="15 18 9 12 15 6"/>
                    </svg>
                </button>
                <div id="library-detail-icon" class="library-detail-icon"></div>
                <div class="library-detail-info">
                    <div id="library-detail-title" class="library-detail-title"></div>
                    <div id="library-detail-count" class="library-detail-count"></div>
                </div>
                <div id="library-detail-actions" class="library-detail-actions"></div>
            </div>
            <div id="library-detail-tracks" class="results-list"></div>
        </div>
    </div>

    <!-- Settings tab -->
    <div class="tab-content" id="tab-settings">
        <!-- Download Location -->
        <div class="settings-card">
            <label class="setting-label">Download Location</label>
            <div class="setting-row" style="margin-top:8px">
                <span id="download-dir-display" class="setting-value">~/Music/YouTube Music Resolve</span>
                <button id="change-dir-btn" class="btn-small">Browse</button>
            </div>
            <button id="open-download-dir-btn" class="settings-link">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                Open in Finder
            </button>
        </div>

        <!-- Audio Preferences -->
        <div class="settings-card">
            <label class="setting-label">Audio Preferences</label>
            <label class="settings-radio">
                <input type="radio" name="default-format" value="mp3">
                <div class="settings-radio-dot"></div>
                <div class="settings-radio-text">
                    <div class="settings-radio-title">MP3 — 320kbps (.mp3)</div>
                    <div class="settings-radio-desc">Compressed audio, smaller file size.</div>
                </div>
            </label>
            <label class="settings-radio">
                <input type="radio" name="default-format" value="wav">
                <div class="settings-radio-dot"></div>
                <div class="settings-radio-text">
                    <div class="settings-radio-title">WAV — 24 bit 48kHz (.wav)</div>
                    <div class="settings-radio-desc">Lossless audio, original recording quality.</div>
                </div>
            </label>
        </div>

        <!-- Resolve Integration -->
        <div class="settings-card resolve-only" style="display:none">
            <label class="setting-label">DaVinci Resolve</label>
            <div class="setting-row" style="margin-top:8px">
                <label class="toggle">
                    <input type="checkbox" id="auto-import-toggle">
                    <span class="toggle-slider"></span>
                </label>
                <span class="setting-hint">Auto-import downloads to Media Pool</span>
            </div>
        </div>

        <!-- Status -->
        <div class="settings-card">
            <div class="setting-row">
                <span id="resolve-status" class="status-badge disconnected">Standalone Mode</span>
            </div>
        </div>
    </div>

    <!-- Player bar (bottom) -->
    <div id="player-bar" class="player-bar hidden">
        <img id="player-thumb" class="player-thumb" src="" alt="">
        <div class="player-info">
            <div id="player-title" class="player-title">-</div>
            <div id="player-subtitle" class="player-subtitle">-</div>
        </div>
        <div class="player-actions">
            <button id="player-play-btn" class="player-btn" title="Play/Pause">
                <svg id="play-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                    <polygon points="6,3 20,12 6,21"/>
                </svg>
                <svg id="pause-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="display:none">
                    <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
                </svg>
                <div id="loading-icon" class="player-loading" style="display:none">
                    <div class="spinner-small"></div>
                </div>
            </button>
            <button id="player-download-btn" class="action-btn" title="Download">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            </button>
            <button id="player-playlist-btn" class="action-btn" title="Add to playlist">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
            <button id="player-import-btn" class="action-btn resolve-only" title="Import to Resolve" style="display:none">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><polyline points="9 15 12 12 15 15"/></svg>
            </button>
        </div>
        <div class="player-seek-area">
            <div class="player-times">
                <span id="player-time" class="player-time">0:00</span>
            </div>
            <div class="player-seek">
                <input type="range" id="player-seek-bar" min="0" max="100" value="0" step="0.1">
            </div>
            <div class="player-times">
                <span id="player-duration" class="player-time">0:00</span>
            </div>
        </div>
    </div>

    <!-- Toast container -->
    <div id="toast-container"></div>

    <!-- Input modal (replaces prompt) -->
    <div id="input-modal" class="modal hidden">
        <div class="modal-content">
            <h3 id="input-modal-title">Enter value</h3>
            <input type="text" id="input-modal-input" class="modal-input" autocomplete="off">
            <div class="modal-actions">
                <button id="input-modal-cancel" class="btn-small">Cancel</button>
                <button id="input-modal-ok" class="btn-small btn-accent">OK</button>
            </div>
        </div>
    </div>

    <!-- Confirm modal -->
    <div id="confirm-modal" class="modal hidden">
        <div class="modal-content">
            <h3 id="confirm-modal-title">Confirm</h3>
            <p id="confirm-modal-message" class="modal-message"></p>
            <div class="modal-actions">
                <button id="confirm-modal-cancel" class="btn-small">Cancel</button>
                <button id="confirm-modal-ok" class="btn-small btn-accent">Delete</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/home.js"></script>
    <script src="js/track-actions.js"></script>
    <script src="js/search.js"></script>
    <script src="js/player.js"></script>
    <script src="js/library.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/init.js"></script>
</body>
</html>
