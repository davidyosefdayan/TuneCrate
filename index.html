<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' https://*.ytimg.com https://*.ggpht.com https://*.googleusercontent.com data:; media-src 'self' https://*.googlevideo.com; connect-src 'self' https://*.googlevideo.com; style-src 'self' 'unsafe-inline'; script-src 'self'">
    <title>YouTube Music</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Titlebar drag region -->
    <div class="titlebar">
        <span class="titlebar-title">YouTube Music</span>
    </div>

    <!-- Tab navigation -->
    <nav class="tabs">
        <button class="tab active" data-tab="search">Search</button>
        <button class="tab" data-tab="library">Library</button>
        <button class="tab" data-tab="settings">Settings</button>
    </nav>

    <!-- Search tab -->
    <div class="tab-content active" id="tab-search">
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="Search YouTube Music..." autocomplete="off">
            <button id="search-btn" class="btn-icon" title="Search">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
                </svg>
            </button>
        </div>
        <div id="search-results" class="results-list">
            <div class="empty-state">
                <svg class="empty-state-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
                </svg>
                Search for music to get started
            </div>
        </div>
    </div>

    <!-- Library tab -->
    <div class="tab-content" id="tab-library">
        <div class="library-header">
            <h3>Playlists</h3>
            <button id="create-playlist-btn" class="btn-small">+ New Playlist</button>
        </div>
        <div id="playlists-container" class="playlists-list">
            <div class="empty-state">
                <svg class="empty-state-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
                </svg>
                No playlists yet
            </div>
        </div>
    </div>

    <!-- Settings tab -->
    <div class="tab-content" id="tab-settings">
        <div class="settings-group">
            <label class="setting-label">Download Directory</label>
            <div class="setting-row">
                <span id="download-dir-display" class="setting-value">~/Music/YouTube Music Resolve</span>
                <button id="change-dir-btn" class="btn-small">Change</button>
            </div>
        </div>
        <div class="settings-group">
            <label class="setting-label">Default Format</label>
            <div class="setting-row">
                <select id="default-format">
                    <option value="mp3">MP3</option>
                    <option value="wav">WAV</option>
                </select>
            </div>
        </div>
        <div class="settings-group resolve-only" style="display:none;">
            <label class="setting-label">Auto-import to Resolve</label>
            <div class="setting-row">
                <label class="toggle">
                    <input type="checkbox" id="auto-import-toggle">
                    <span class="toggle-slider"></span>
                </label>
                <span class="setting-hint">Automatically import downloaded tracks to Media Pool</span>
            </div>
        </div>
        <div class="settings-group">
            <label class="setting-label">yt-dlp Path (optional)</label>
            <div class="setting-row">
                <input type="text" id="ytdlp-path" placeholder="Leave empty for bundled/system yt-dlp">
            </div>
        </div>
        <div class="settings-group">
            <label class="setting-label">Resolve Status</label>
            <div class="setting-row">
                <span id="resolve-status" class="status-badge disconnected">Standalone Mode</span>
            </div>
        </div>
        <div class="settings-group">
            <button id="open-download-dir-btn" class="btn-small">Open Download Folder</button>
        </div>
    </div>

    <!-- Player bar (bottom) -->
    <div id="player-bar" class="player-bar hidden">
        <img id="player-thumb" class="player-thumb" src="" alt="">
        <div class="player-info">
            <div id="player-title" class="player-title">-</div>
            <div id="player-artist" class="player-artist">-</div>
        </div>
        <div class="player-actions">
            <button id="player-play-btn" class="player-btn" title="Play/Pause">
                <svg id="play-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                    <polygon points="6,3 20,12 6,21"/>
                </svg>
                <svg id="pause-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="display:none">
                    <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
                </svg>
                <div id="loading-icon" class="player-loading" style="display:none">
                    <div class="spinner-small"></div>
                </div>
            </button>
            <button id="player-download-btn" class="action-btn" title="Download">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            </button>
            <button id="player-playlist-btn" class="action-btn" title="Add to playlist">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
            <button id="player-import-btn" class="action-btn resolve-only" title="Import to Resolve" style="display:none">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><polyline points="9 15 12 12 15 15"/></svg>
            </button>
        </div>
        <div class="player-seek-area">
            <div class="player-times">
                <span id="player-time" class="player-time">0:00</span>
            </div>
            <div class="player-seek">
                <input type="range" id="player-seek-bar" min="0" max="100" value="0" step="0.1">
            </div>
            <div class="player-times">
                <span id="player-duration" class="player-time">0:00</span>
            </div>
        </div>
    </div>

    <!-- Toast container -->
    <div id="toast-container"></div>

    <!-- Playlist add modal -->
    <div id="playlist-modal" class="modal hidden">
        <div class="modal-content">
            <h3>Add to Playlist</h3>
            <div id="playlist-modal-list"></div>
            <div class="modal-actions">
                <button id="modal-cancel" class="btn-small">Cancel</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/search.js"></script>
    <script src="js/player.js"></script>
    <script src="js/library.js"></script>
    <script src="js/settings.js"></script>
</body>
</html>
